<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>ContextRail Desklet</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020; color: #e6ebff; padding: env(safe-area-inset-top) 0 0;
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px; background: #141b34; border-bottom: 1px solid #243056;
        position: sticky; top: 0;
      }
      header .role { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
      header .status { font-size: 13px; color: #7fe7c4; }
      main { padding: 18px; max-width: 720px; margin: 0 auto; }
      .meta { display: flex; gap: 12px; font-size: 12px; color: #8d99c4; margin-bottom: 14px; flex-wrap: wrap; }
      #stale {
        display: none; background: #4a2a12; color: #ffcf99; border: 1px solid #7a4a1f;
        padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; font-size: 13px;
      }
      #actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
      button {
        background: #2b6cff; color: white; border: 0; border-radius: 10px;
        padding: 12px 16px; font-size: 15px; font-weight: 600; cursor: pointer;
      }
      button:active { transform: translateY(1px); background: #2057d6; }
      pre {
        background: #0f1730; border: 1px solid #243056; border-radius: 10px;
        padding: 14px; overflow: auto; font-size: 13px; color: #c7d2ff;
      }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8d99c4; margin: 18px 0 8px; }
      #log { font-size: 12px; color: #9fb0e0; }
      #log div { padding: 3px 0; border-bottom: 1px solid #1a2banner; }
      #pair-hint { display: none; color: #ffcf99; margin-top: 14px; }
      .dot { color: #7fe7c4; }
    </style>
  </head>
  <body>
    <header>
      <span class="role" id="role">Desklet</span>
      <span class="status" id="status">starting…</span>
    </header>
    <main>
      <div class="meta">
        <span>device: <code id="device">—</code></span>
        <span id="version">—</span>
      </div>
      <div id="stale">⚠ Context is stale — host is in a degraded state.</div>
      <div id="actions"></div>
      <h2>Context</h2>
      <pre id="context">waiting for context…</pre>
      <h2>Activity</h2>
      <div id="log"></div>
      <div id="pair-hint">
        This device is not paired. On the host run a new pairing and open the QR/URL it prints
        (or visit this page with <code>?ott=…</code>).
      </div>
    </main>
    <script src="/desklet.js"></script>
  </body>
</html>
