<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e13" />
    <title>ContextRail</title>
    <link rel="stylesheet" href="/tokens.css?v=2" />
    <style>
      body { min-height: 100vh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }

      .bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 20px 13px; }
      .lead { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .badge { width: 40px; height: 40px; flex: 0 0 auto; font: 700 13px/1 var(--font-mono); letter-spacing: 0.04em; color: var(--signal); }
      .role { font: 700 20px/1.1 var(--font-sans); letter-spacing: 0.2px; margin-top: 3px; }
      #role-sub { margin-bottom: 1px; }

      main { flex: 1 1 auto; width: 100%; max-width: 880px; margin: 0 auto; padding: 18px 20px 28px; }
      .sec { display: block; margin: 26px 0 12px; }
      .sec:first-child { margin-top: 6px; }

      .stale { display: none; align-items: center; gap: 9px; margin: 16px 0; padding: 10px 13px;
        border: 1px solid #5b4420; border-radius: var(--r-card); background: rgba(255, 159, 69, 0.08);
        color: var(--warn); font: 500 13px/1.4 var(--font-sans); }

      /* Action tiles — instrument keys */
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 13px; }
      .tile { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 13px;
        padding: 16px 15px; min-height: 124px; cursor: pointer; user-select: none;
        background: linear-gradient(180deg, var(--housing-2), var(--housing));
        border: 1px solid var(--rail-2); border-radius: var(--r-tile);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
        transition: transform var(--t), border-color var(--t), box-shadow var(--t); }
      .tile:hover { border-color: #4a566a; box-shadow: var(--e-2); transform: translateY(-1px); }
      .tile:active { transform: translateY(1px); box-shadow: 0 -4px 12px -8px rgba(0,0,0,0.7) inset, 0 2px 0 rgba(255,255,255,0.03) inset; }
      .tile .ic { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; color: var(--muted);
        background: radial-gradient(120% 120% at 50% 18%, var(--housing-3), var(--housing));
        border: 1px solid var(--rail-2); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 -6px 14px -10px rgba(0,0,0,0.85) inset;
        transition: color var(--t); }
      .tile .ic svg { width: 23px; height: 23px; }
      .tile:hover .ic { color: var(--signal); }
      .tile .lbl { font: 620 14.5px/1.25 var(--font-sans); }
      .tile .kind { font: 600 10px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); margin-top: -7px; }
      .tile .state { position: absolute; top: 13px; right: 13px; width: 18px; height: 18px; display: grid; place-items: center; font-size: 12px; opacity: 0; transition: opacity var(--t); }
      .tile[data-st] .state { opacity: 1; }
      .tile[data-st="running"] .state::before { content: ""; width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--signal); border-top-color: transparent; animation: spin 0.7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .tile[data-st="ok"] { border-color: var(--ok); } .tile[data-st="ok"] .state { color: var(--ok); } .tile[data-st="ok"] .state::before { content: "✓"; font-weight: 800; }
      .tile[data-st="bad"] { border-color: var(--fault); } .tile[data-st="bad"] .state { color: var(--fault); } .tile[data-st="bad"] .state::before { content: "✕"; font-weight: 800; }
      .empty { color: var(--muted-2); font: 400 13.5px/1.5 var(--font-sans); padding: 6px 2px; }

      /* Resource-monitor meters */
      .meters { display: grid; grid-template-columns: repeat(auto-fit, minmax(248px, 1fr)); gap: 13px; }
      .meter { padding: 16px 17px; }
      .meter .head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
      .meter .head .lbl { font: 600 11px/1 var(--font-mono); letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); }
      .meter .head .val { font: 600 23px/1 var(--font-mono); color: var(--text); font-variant-numeric: tabular-nums; }
      .meter .track { position: relative; height: 10px; margin-top: 13px; border-radius: 6px; background: var(--housing); border: 1px solid var(--rail); overflow: hidden; }
      .meter .fill { height: 100%; width: 0; border-radius: 6px; background: linear-gradient(90deg, var(--signal), #ffd071); transition: width 0.45s cubic-bezier(0.2,0.7,0.3,1); }
      .meter.warn .fill { background: linear-gradient(90deg, var(--warn), #ffc89a); }
      .meter.fault .fill { background: linear-gradient(90deg, var(--fault), #ff9aa6); }
      .meter .track::after { content: ""; position: absolute; inset: 0; pointer-events: none;
        background-image: repeating-linear-gradient(90deg, transparent 0 8px, rgba(0,0,0,0.4) 8px 9px); }
      .meter .sub { font: 500 10.5px/1 var(--font-mono); letter-spacing: 0.04em; color: var(--muted-2); margin-top: 10px; }
      .meter .spark { margin-top: 12px; height: 32px; }
      .meter .spark svg { width: 100%; height: 32px; display: block; }
      .meter .spark polyline { fill: none; stroke: var(--signal); stroke-width: 1.6; vector-effect: non-scaling-stroke; }
      .meter .spark .area { fill: var(--signal-soft); stroke: none; }

      /* Context — readout cards */
      .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 11px; }
      .card .k { font: 600 10.5px/1 var(--font-mono); letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted-2); }
      .card .v { font: 400 13.5px/1.45 var(--font-mono); color: var(--text); margin-top: 6px; white-space: pre-wrap; word-break: break-word; }

      /* Activity */
      #log { display: flex; flex-direction: column; }
      #log .row { display: flex; gap: 12px; padding: 7px 0; border-bottom: 1px solid rgba(38, 47, 59, 0.6); font: 400 12.5px/1.4 var(--font-sans); color: var(--muted); }
      #log .row time { flex: 0 0 auto; color: var(--muted-2); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
      #log .row.ok { color: var(--ok); } #log .row.bad { color: var(--fault); }

      .foot { display: flex; gap: 16px; justify-content: center; padding: 14px; border-top: var(--hair);
        font: 400 11px/1 var(--font-mono); letter-spacing: 0.06em; color: var(--muted-2); }
      .foot code { color: var(--muted); }
      #pair-hint { display: none; color: var(--warn); margin-top: 16px; font: 400 13.5px/1.6 var(--font-sans); }
      .hidden { display: none !important; }
    </style>
  </head>
  <body data-s="connecting">
    <header class="bar">
      <div class="lead">
        <div class="socket badge" id="role-badge">◆</div>
        <div>
          <div class="eyebrow" id="role-sub">contextrail · desklet</div>
          <div class="role" id="role">ContextRail</div>
        </div>
      </div>
      <div class="pill" id="status-wrap" data-s="connecting"><span class="dot"></span><span id="status">starting…</span></div>
    </header>
    <div class="rail-line"><span class="node"></span></div>

    <main>
      <div class="stale" id="stale">Context is stale — host is in a degraded state.</div>

      <section id="actions-view" class="hidden">
        <div class="eyebrow sec">Actions</div>
        <div class="grid" id="tiles"></div>
      </section>

      <section id="status-view" class="hidden">
        <div class="eyebrow sec">Resource Monitor</div>
        <div class="meters" id="meters"></div>
        <div class="eyebrow sec">Host</div>
        <div class="cards" id="readouts"></div>
      </section>

      <section id="context-view">
        <div class="eyebrow sec" id="context-title">Context</div>
        <div class="cards" id="context-cards"><div class="empty">waiting for context…</div></div>
      </section>

      <div class="eyebrow sec">Activity</div>
      <div id="log"></div>

      <div id="pair-hint">
        This device isn't paired. On the host, open the console and scan the QR (or open the URL with
        <code>?ott=…</code>).
      </div>
    </main>

    <footer class="foot">
      <span>device <code id="device">—</code></span>
      <span id="version">—</span>
    </footer>

    <script src="/desklet.js?v=9"></script>
  </body>
</html>
