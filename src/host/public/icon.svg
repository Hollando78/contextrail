<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ContextRail">
  <!-- Full-bleed background so the icon is maskable (content kept in the safe zone). -->
  <rect width="512" height="512" rx="96" fill="#0e131b"/>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="50%" cy="8%" r="90%">
      <stop offset="0%" stop-color="#f3b43a" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#0e131b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rail line -->
  <rect x="116" y="250" width="280" height="12" rx="6" fill="#36414f"/>
  <!-- Energised node -->
  <circle cx="256" cy="256" r="46" fill="#f3b43a"/>
  <circle cx="256" cy="256" r="78" fill="none" stroke="#f3b43a" stroke-opacity="0.35" stroke-width="6"/>
  <circle cx="256" cy="256" r="112" fill="none" stroke="#f3b43a" stroke-opacity="0.15" stroke-width="6"/>
</svg>
