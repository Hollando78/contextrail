<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ContextRail · Host Console</title>
    <link rel="stylesheet" href="/tokens.css?v=2" />
    <style>
      body { min-height: 100vh; }
      .bar { display: flex; align-items: center; gap: 13px; padding: 18px 24px 14px; max-width: 980px; margin: 0 auto; }
      .bar .badge { width: 40px; height: 40px; flex: 0 0 auto; color: var(--signal); }
      .bar .badge svg { width: 22px; height: 22px; }
      .bar .title { font: 700 20px/1.1 var(--font-sans); margin-top: 3px; }
      .bar .host { margin-left: auto; font: 500 12px/1 var(--font-mono); color: var(--cool); letter-spacing: 0.03em; }
      .wrap { width: 100%; max-width: 980px; margin: 0 auto; padding: 20px 24px 36px;
        display: grid; grid-template-columns: minmax(0, 380px) 1fr; gap: 20px; align-items: start; }
      @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; } }
      .panel { padding: 20px; }
      .panel > .eyebrow { display: block; margin-bottom: 14px; }

      .roles { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
      .roles button { flex: 1 1 28%; background: var(--housing-2); color: var(--muted); border: 1px solid var(--rail-2);
        border-radius: var(--r-ctl); padding: 9px 8px; font: 600 13px var(--font-sans); cursor: pointer; transition: var(--t); }
      .roles button:hover { color: var(--text); border-color: #4a566a; }
      .roles button.active { background: linear-gradient(180deg, #ffd071, var(--signal)); color: #07101a; border-color: var(--signal); }

      .field { display: block; margin-bottom: 16px; }
      .field > .eyebrow { display: block; margin-bottom: 6px; }
      #addr { width: 100%; background: var(--housing-2); color: var(--text); border: 1px solid var(--rail-2);
        border-radius: var(--r-ctl); padding: 10px; font: 500 13px var(--font-mono); }

      .qrwrap { background: #fff; border-radius: 12px; padding: 14px; display: grid; place-items: center; aspect-ratio: 1;
        margin-bottom: 14px; border: 1px solid var(--rail-2); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset; }
      .qrwrap img { width: 100%; height: 100%; image-rendering: pixelated; }
      .qrwrap.empty { background: var(--housing); color: var(--muted-2); font: 400 13px var(--font-sans); text-align: center; }
      .url { font: 400 11.5px/1.5 var(--font-mono); color: var(--cool); word-break: break-all; text-align: center; margin-bottom: 8px; }
      .meta { display: flex; justify-content: center; font: 500 11px var(--font-mono); letter-spacing: 0.08em; color: var(--muted-2); text-transform: uppercase; }
      .meta b { color: var(--signal); }
      .hint { font: 400 12px/1.6 var(--font-sans); color: var(--muted-2); margin-top: 16px; }
      .hint b { color: var(--muted); }
      code { background: var(--housing); border: var(--hair); padding: 1px 6px; border-radius: 6px; font-family: var(--font-mono); font-size: 12px; }

      .devices-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
      .devices-head .eyebrow { margin: 0; }
      #count { font: 600 11px var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--ok); }
      .dev { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 8px;
        border: var(--hair); border-radius: var(--r-card); background: linear-gradient(180deg, var(--housing-2), var(--housing));
        box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset; }
      .dev .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; background: var(--muted-2); }
      .dev .dot.on { background: var(--signal); box-shadow: 0 0 9px rgba(243,180,58,0.55); }
      .dev .dot.off { background: var(--muted-2); }
      .dev .info { flex: 1 1 auto; min-width: 0; }
      .dev .id { font: 500 12.5px var(--font-mono); color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .dev .sub { font: 400 11px var(--font-mono); color: var(--muted-2); margin-top: 3px; }
      .dev select { background: var(--housing-2); color: var(--text); border: 1px solid var(--rail-2); border-radius: 8px; padding: 6px 8px; font: 500 12px var(--font-mono); }
      .dev .forget { background: rgba(251,97,118,0.1); color: var(--fault); border: 1px solid #6a2a36; border-radius: 8px; padding: 6px 11px; font: 600 12px var(--font-sans); cursor: pointer; }
      .dev .forget:active { transform: translateY(1px); }
      .empty-note { color: var(--muted-2); font: 400 13px var(--font-sans); }
    </style>
  </head>
  <body>
    <header class="bar">
      <div class="socket badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 12h18"/><circle cx="9" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg></div>
      <div>
        <div class="eyebrow">contextrail · host</div>
        <div class="title">Host Console</div>
      </div>
      <div class="host" id="hosturl">—</div>
    </header>
    <div class="rail-line"><span class="node"></span></div>

    <div class="wrap">
      <section class="card panel">
        <span class="eyebrow">Pair a device</span>
        <div class="roles" id="roles"></div>
        <label class="field">
          <span class="eyebrow">Host address</span>
          <select id="addr"></select>
        </label>
        <div class="qrwrap empty" id="qrwrap">pick a role to generate a pairing code</div>
        <div class="url" id="url"></div>
        <div class="meta"><span class="ttl" id="ttl"></span></div>
        <div class="hint">
          Scan with a spare phone/tablet on the same network. Accept the certificate warning
          (<b>Advanced → Proceed</b>) if self-signed. The code auto-refreshes before it expires.
        </div>
      </section>

      <section class="card panel">
        <div class="devices-head">
          <span class="eyebrow">Paired devices</span>
          <span id="count">— paired</span>
        </div>
        <div id="devicelist"></div>
      </section>
    </div>

    <script>
      const ROLES = ['Project', 'Actions', 'Status', 'Capture', 'Logs', 'AI'];
      let active = 'Status';
      let timer = null;
      let expiresAt = 0;
      let addr = '';

      const $ = (id) => document.getElementById(id);

      function label(ip) {
        if (!/^\d+\.\d+\.\d+\.\d+$/.test(ip)) return ip + '  (domain · trusted)';
        if (ip.startsWith('192.168.') || ip.startsWith('10.')) return ip + '  (Wi-Fi LAN)';
        if (/^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(ip)) return ip + '  (Tailscale)';
        if (/^172\.(1[6-9]|2\d|3[01])\./.test(ip)) return ip + '  (virtual)';
        return ip;
      }

      function populateAddrs(list, chosen) {
        const sel = $('addr');
        if (sel.options.length && addr) return; // already populated
        sel.innerHTML = '';
        for (const ip of list) {
          const o = document.createElement('option');
          o.value = ip; o.textContent = label(ip);
          if (ip === chosen) o.selected = true;
          sel.appendChild(o);
        }
        addr = chosen || (list[0] || '');
        sel.onchange = () => { addr = sel.value; mint(); };
      }

      function renderRoles() {
        const wrap = $('roles');
        wrap.innerHTML = '';
        for (const r of ROLES) {
          const b = document.createElement('button');
          b.textContent = r;
          if (r === active) b.classList.add('active');
          b.onclick = () => { active = r; renderRoles(); mint(); };
          wrap.appendChild(b);
        }
      }

      async function mint() {
        try {
          const q = '/pair/new?role=' + encodeURIComponent(active) + (addr ? '&addr=' + encodeURIComponent(addr) : '');
          const res = await fetch(q);
          const data = await res.json();
          if (!data.qr) throw new Error(data.error || 'mint failed');
          if (data.addresses) populateAddrs(data.addresses, data.addr);
          $('qrwrap').classList.remove('empty');
          $('qrwrap').innerHTML = '<img alt="pairing QR" src="' + data.qr + '" />';
          $('url').textContent = data.url;
          $('hosturl').textContent = data.url.replace(/\/\?.*/, '');
          expiresAt = data.expiresAt || Date.now() + 30000;
        } catch (e) {
          $('qrwrap').classList.add('empty');
          $('qrwrap').textContent = 'error: ' + e.message;
        }
      }

      function ago(iso) {
        const s = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 1000));
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.round(s / 60) + 'm ago';
        return Math.round(s / 3600) + 'h ago';
      }

      async function deviceOp(deviceId, op, role) {
        try {
          const res = await fetch('/admin/device', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ op, deviceId, role }),
          });
          if (!res.ok) {
            const e = await res.json();
            alert('Failed: ' + (e.error || e.message || res.status));
          }
        } catch (e) { alert('Failed: ' + e.message); }
        refreshDevices();
      }

      function renderDevices(devices, roles) {
        const list = $('devicelist');
        if (!devices.length) { list.innerHTML = '<div class="empty-note">No devices paired yet.</div>'; return; }
        list.innerHTML = '';
        for (const d of devices) {
          const row = document.createElement('div');
          row.className = 'dev';

          const dot = document.createElement('span');
          dot.className = 'dot ' + (d.connected ? 'on' : 'off');
          dot.title = d.connected ? 'connected' : 'offline';

          const info = document.createElement('div');
          info.className = 'info';
          info.innerHTML = '<div class="id">' + d.deviceId + '</div>' +
            '<div class="sub">' + (d.connected ? 'connected' : 'offline') + ' · seen ' + ago(d.lastSeen) + '</div>';

          const sel = document.createElement('select');
          sel.title = 'switch role';
          for (const r of roles) {
            const o = document.createElement('option');
            o.value = r; o.textContent = r; if (r === d.role) o.selected = true;
            sel.appendChild(o);
          }
          sel.onchange = () => deviceOp(d.deviceId, 'switch-role', sel.value);

          const forget = document.createElement('button');
          forget.className = 'forget'; forget.textContent = 'Forget';
          forget.onclick = () => { if (confirm('Forget ' + d.deviceId + '? It will need to re-pair.')) deviceOp(d.deviceId, 'forget'); };

          row.append(dot, info, sel, forget);
          list.appendChild(row);
        }
      }

      async function refreshDevices() {
        try {
          const s = await (await fetch('/admin/status')).json();
          const devices = s.pairedDevices || [];
          const live = devices.filter((d) => d.connected).length;
          $('count').textContent = devices.length ? live + ' live · ' + devices.length + ' paired' : 'no devices paired';
          renderDevices(devices, s.roles || ROLES);
        } catch {
          $('count').textContent = '— paired';
        }
      }

      function tick() {
        const left = Math.max(0, Math.round((expiresAt - Date.now()) / 1000));
        $('ttl').innerHTML = expiresAt ? 'expires in <b>' + left + 's</b>' : '';
        if (expiresAt && left <= 5) {
          expiresAt = 0; // guard against repeated mints
          mint(); // auto-refresh before expiry
        }
      }

      renderRoles();
      mint();
      refreshDevices();
      timer = setInterval(tick, 1000);
      setInterval(refreshDevices, 3000);
    </script>
  </body>
</html>
