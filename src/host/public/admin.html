<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ContextRail · Host Console</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 50% -10%, #18213f, #0b1020 60%); color: #e6ebff;
        display: flex; flex-direction: column; align-items: center; padding: 32px 16px;
      }
      h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: 0.3px; }
      .sub { color: #8d99c4; font-size: 13px; margin-bottom: 24px; }
      .card {
        background: #121a33; border: 1px solid #243056; border-radius: 16px; padding: 24px;
        width: min(440px, 100%); box-shadow: 0 20px 60px -30px #000;
      }
      .roles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
      .roles button {
        flex: 1 1 30%; background: #1b2547; color: #c7d2ff; border: 1px solid #2c3a66;
        border-radius: 10px; padding: 10px 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .roles button.active { background: #2b6cff; color: #fff; border-color: #2b6cff; }
      .qrwrap {
        background: #fff; border-radius: 12px; padding: 14px; display: flex; align-items: center;
        justify-content: center; aspect-ratio: 1; margin-bottom: 16px;
      }
      .qrwrap img { width: 100%; height: 100%; image-rendering: pixelated; }
      .qrwrap.empty { background: #0f1730; color: #66719c; font-size: 14px; }
      .url { font-size: 12px; color: #9fb0e0; word-break: break-all; text-align: center; margin-bottom: 6px; }
      .meta { display: flex; justify-content: space-between; font-size: 12px; color: #8d99c4; }
      .count { color: #7fe7c4; }
      .ttl b { color: #ffcf99; }
      .hint { font-size: 12px; color: #66719c; margin-top: 18px; max-width: 440px; text-align: center; }
      code { background: #0f1730; padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>ContextRail · Host Console</h1>
    <div class="sub" id="hosturl">—</div>
    <div class="card">
      <div class="roles" id="roles"></div>
      <label style="font-size:12px;color:#8d99c4;display:block;margin-bottom:14px;">
        host address
        <select id="addr" style="width:100%;margin-top:4px;background:#1b2547;color:#c7d2ff;border:1px solid #2c3a66;border-radius:8px;padding:8px;font-size:13px;"></select>
      </label>
      <div class="qrwrap empty" id="qrwrap">pick a role to generate a pairing code</div>
      <div class="url" id="url"></div>
      <div class="meta">
        <span class="ttl" id="ttl"></span>
        <span class="count" id="count">— paired</span>
      </div>
    </div>
    <div class="hint">
      Scan the QR with a spare phone/tablet on the same Wi-Fi. Accept the self-signed certificate
      warning (<b>Advanced → Proceed</b>). The code auto-refreshes before it expires.
    </div>

    <script>
      const ROLES = ['Project', 'Actions', 'Status', 'Capture', 'Logs', 'AI'];
      let active = 'Status';
      let timer = null;
      let expiresAt = 0;
      let addr = '';

      const $ = (id) => document.getElementById(id);

      function label(ip) {
        if (ip.startsWith('192.168.') || ip.startsWith('10.')) return ip + '  (Wi-Fi LAN)';
        if (/^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(ip)) return ip + '  (Tailscale)';
        if (/^172\.(1[6-9]|2\d|3[01])\./.test(ip)) return ip + '  (virtual)';
        return ip;
      }

      function populateAddrs(list, chosen) {
        const sel = $('addr');
        if (sel.options.length && addr) return; // already populated
        sel.innerHTML = '';
        for (const ip of list) {
          const o = document.createElement('option');
          o.value = ip; o.textContent = label(ip);
          if (ip === chosen) o.selected = true;
          sel.appendChild(o);
        }
        addr = chosen || (list[0] || '');
        sel.onchange = () => { addr = sel.value; mint(); };
      }

      function renderRoles() {
        const wrap = $('roles');
        wrap.innerHTML = '';
        for (const r of ROLES) {
          const b = document.createElement('button');
          b.textContent = r;
          if (r === active) b.classList.add('active');
          b.onclick = () => { active = r; renderRoles(); mint(); };
          wrap.appendChild(b);
        }
      }

      async function mint() {
        try {
          const q = '/pair/new?role=' + encodeURIComponent(active) + (addr ? '&addr=' + encodeURIComponent(addr) : '');
          const res = await fetch(q);
          const data = await res.json();
          if (!data.qr) throw new Error(data.error || 'mint failed');
          if (data.addresses) populateAddrs(data.addresses, data.addr);
          $('qrwrap').classList.remove('empty');
          $('qrwrap').innerHTML = '<img alt="pairing QR" src="' + data.qr + '" />';
          $('url').textContent = data.url;
          $('hosturl').textContent = data.url.replace(/\/\?.*/, '');
          expiresAt = data.expiresAt || Date.now() + 30000;
        } catch (e) {
          $('qrwrap').classList.add('empty');
          $('qrwrap').textContent = 'error: ' + e.message;
        }
      }

      async function refreshCount() {
        try {
          const res = await fetch('/health');
          await res.json();
        } catch {}
      }

      function tick() {
        const left = Math.max(0, Math.round((expiresAt - Date.now()) / 1000));
        $('ttl').innerHTML = expiresAt ? 'expires in <b>' + left + 's</b>' : '';
        if (expiresAt && left <= 5) {
          expiresAt = 0; // guard against repeated mints
          mint(); // auto-refresh before expiry
        }
      }

      renderRoles();
      mint();
      timer = setInterval(tick, 1000);
    </script>
  </body>
</html>
